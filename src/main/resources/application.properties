spring.application.name=Task-Tracker


spring.mongodb.uri=${MONGO_URI}
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG

spring.jackson.date-format=yyyy-MM-dd

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

streak.max-gap-days=2
streak.forgiveness-allowed=1
streak.allow-forgiveness=true

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:kanishkgame360@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:true}
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SSL:false}